    severity: info
    description: |
      Immune cells are significantly increased in AS: NKT_cells (4.2% -> 19.1%), Macrophages (0.5% -> 6.8%)
      Simultaneously, secretory glandular epithelium (16.1% -> 1.8%) and decidualized stroma (48.5% -> 34.2%) are markedly reduced.
