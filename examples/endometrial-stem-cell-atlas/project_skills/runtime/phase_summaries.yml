      Step 1 - Global communication analysis:
      - Method: liana rank_aggregate (CellChat + CellPhoneDB + NATMI consensus scoring)
      - Resource: consensus (4,624 LR pairs), 1000 permutations
      - 56,760 interaction tests, 1,430 significant (magnitude_rank<0.01)
      - Downsampled: max 5000 cells per type

      Stem cell niche interactions:
      - 636 significant interactions (315 received + 435 sent)
      - SOX9+LGR5+_stem: 20 autocrine + 94 paracrine; primarily from Basalis_fibroblast/Decidualized_stromal
      - CD133+_progenitor: 1 autocrine + 65 paracrine (primarily paracrine-dependent)
      - Basalis_fibroblast: most active niche signaling hub (250 outgoing signals)
      - ECM/Adhesion pathways dominant (299 interactions), WNT (28), Inflammation (24), EGF (16)

      Disease-differential communication (Control vs AS):
      - 33,721 common interactions; 11,746 enhanced in AS, 9,423 reduced in AS
      - Fibrosis signals: 2,167 enhanced vs 1,433 reduced in AS (net enhancement)
      - Regeneration signals: 1,233 enhanced vs 1,105 reduced in AS

      Step 2 - Pathway in-depth analysis:
      20 significantly changed pathways (padj<0.05):
      - SOX9+LGR5+_stem: all pathways downregulated (WNT/NOTCH/TGFb/EGF/FGF/Hedgehog/Cytokine/Chemokine) *
      - CD133+_progenitor: Chemokine downward, FGF down, EGF down; but NOTCH up, WNT up
      - Basalis_fibroblast: pathways upregulated (NOTCH up, WNT up, Hedgehog up, TGFb up, EGF up) * fibrotic reprogramming

      Top ligands: TIMP1, LGALS1, LUM, VIM, COL1A1 (ECM/adhesion dominant)
      Drug target candidates: ligands CXCL8, LGALS9, SEMA4D, PDGFC, DKK3; receptors SDC2, MET, PDGFRA
