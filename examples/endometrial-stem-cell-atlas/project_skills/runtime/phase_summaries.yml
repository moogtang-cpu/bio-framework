  - phase: 4
    step: "spatial_qc + deconvolution"
    status: "completed"
    completed_at: "2026-03-06"
    summary: |
      GSE287278 RIF Visium spatial transcriptomics analysis complete (8 samples: CTR1-4, RIF1-4).

      Step 1 - Spatial QC and preprocessing:
      - 10,163 → 10,135 spots (99.7%), 14,359 common genes
      - QC thresholds: UMI>=500, genes>=200, mt%<=25, min_cells>=5
      - Harmony batch correction → UMAP → Leiden clustering (0.3/0.5/0.8/1.0)
      - 3000 HVG (seurat_v3), 30 PCs

      Step 2 - Spatial region annotation:
      - Stroma: 6,480 spots (63.9%) -- clusters 0,1,4,5
      - Functionalis: 3,423 spots (33.8%) -- clusters 2,3
      - Basalis_niche: 232 spots (2.3%) -- cluster 6
      - Automated annotation based on 8 marker gene set scores

      Step 3 - Cell2location deconvolution:
      - Reference: Phase 3 integrated atlas (60,445 cells sampled, 14 cell types)
      - Common genes: 13,017
      - NB regression: 100 epochs (ELBO ~4.54e+8)
      - Spatial model: 5,000 epochs (ELBO ~7.97e+7)

      Key findings:
      - SOX9+LGR5+_stem: decreased in RIF (CTR=3.26%, RIF=2.48%, p<0.001)
      - CD133+_progenitor: increased in RIF (CTR=3.47%, RIF=5.86%, p<0.001)
      - Basalis_fibroblast: decreased in RIF (CTR=12.91%, RIF=9.84%)
      - Stem cell enrichment in Basalis_niche region: SOX9+LGR5+ (4.31%), CD133+ (9.46%-13.34%)
    key_decisions:
      - "Cell2location used instead of RCTD: Bayesian model better suited for sparse Visium data"
      - "Reference data sampled at max 5000/type (60,445 cells) to balance computational efficiency and representativeness"
      - "NB regression 100 epochs (originally 250; ELBO converged at ~50 epochs)"
      - "Spatial model 5000 epochs (originally 30000; ELBO converged at ~3000)"
      - "Lightning 2.6.1 requires accelerator='gpu' instead of use_gpu=True"
      - "obs_names_make_unique() resolves duplicate barcode issues across samples"
      - "E-MTAB-9260 spatial coordinates not ready (F-2); only GSE287278 processed"
    outputs:
