  - phase: 6
    step: "trajectory_grn"
    status: "completed"
    completed_at: "2026-03-06"
    summary: |
      Stem cell fate trajectory and transcription factor regulatory network analysis complete.

      Step 1 - Trajectory analysis:
      Epithelial lineage DPT (72,417 cells): SOX9+LGR5+_stem → CD133+_progenitor → Glandular/Secretory
      - SOX9+LGR5+_stem pseudotime median=0.116 (earliest); CD133+_progenitor=0.516
      - PAGA connectivity confirmed stem → progenitor → differentiated epithelium lineage relationship

      Mesenchymal lineage DPT (134,504 cells): Basalis_fibroblast → Decidualized_stromal → Smooth_muscle
      - Basalis_fibroblast earliest pseudotime, supporting its role as niche stem cell

      CytoTRACE stemness score (simplified version, based on gene detection count):
      - SOX9+LGR5+_stem highest (0.342), confirming stem cell identity
      - CD133+_progenitor (0.304), Basalis_fibroblast (0.290)
      - SOX9+LGR5+ CytoTRACE drastically decreased in AS (0.334 → 0.072, p=1.78e-48) *

      Disease trajectory comparison (KS test, all p<0.05):
      - SOX9+LGR5+: ctrl_median=0.334, AS_median=0.072, difference=-0.261
      - CD133+_progenitor: ctrl=0.230, AS=0.138, difference=-0.092
      - Glandular_epithelium: ctrl=0.299, AS=0.179, difference=-0.120

      Step 2 - TF activity inference (decoupler ULM + CollecTRI):
      - 760 TF activities inferred, 62,411 regulatory relationships
      - Top TFs: MYC, ZBTB4, TP53, JUN show high activity across cell types

      Disease-differential TFs (AS vs Control, padj<0.05):
      - SOX9+LGR5+_stem: 255 up + 352 down (REST/MYC downregulated, IRF9 upregulated)
      - CD133+_progenitor: 161 up + 404 down (GRHL2/RBPJ downregulated, ZEB2 upregulated)
      - Basalis_fibroblast: 395 up + 196 down (STAT2/GATA4 upregulated)
      - Decidualized_stromal: 438 up + 304 down
      - Glandular_epithelium: 285 up + 409 down (ZEB2/SNAI2 upregulated → EMT)
    key_decisions:
      - "CellRank CytoTRACE kernel requires 'Ms' layer which is unavailable; switched to simplified gene detection count version"
      - "decoupler 2.x API: dc.mt.ulm(); results stored in obsm['score_ulm']"
      - "CollecTRI via omnipath (genesymbols=True); filtered sources starting with COMPLEX"
      - "PAGA + DPT used instead of Monocle3/RNA velocity (no additional layers or splicing information required)"
    outputs:
      - "Phase_output/phase6_trajectory/epithelial_trajectory.h5ad (72,417 cells)"
      - "Phase_output/phase6_trajectory/mesenchymal_trajectory.h5ad (134,504 cells)"
      - "Phase_output/phase6_trajectory/tf_diff_*.csv (TF differential tables for 5 cell types)"
      - "Phase_output/phase6_trajectory/phase6_report.json"
      - "Phase_output/phase6_trajectory/figures/ (10+ figures: PAGA, DPT, CytoTRACE, TF heatmap, UMAP)"

