  - phase: 3
    step: "batch_integration + joint_clustering"
    status: "completed"
    completed_at: "2026-03-06"
    summary: |
      5 datasets integrated (Harmony, GPU-accelerated, 3-round convergence).

      Integrated datasets:
      - GSE215968_AS_vs_WOI: 106,400 cells (Asherman's syndrome vs WOI control)
      - GSE215968_CD133: 69,701 cells (CD133+ stem/progenitor cell-enriched)
      - GSE111976: 61,503 cells (normal menstrual cycle)
      - E-MTAB-10287: 49,550 cells (endometrial temporal dynamics)
      - GSE260658: 27,651 cells (endometrium + decidua subset, myometrium excluded)
      Total: 314,805 cells x 18,365 common genes

      Excluded:
      - GSE215968_AS_pre_vs_post: post-treatment samples introduce confounding factors
      - GSE216748_organoid: in vitro data reserved for Phase 8 validation
      - HECA reference atlas: used in reference_mapping step

      Processing pipeline:
      log1p(10K) normalization → 3000 HVG (dataset-aware) → 50 PCs (randomized SVD) → Harmony (GPU) → 30-neighbors → UMAP → Leiden multi-resolution

      Leiden clustering:
      - res=0.5: 18 clusters
      - res=0.8: 24 clusters
      - res=1.0: 29 clusters (primary clustering)
      - res=1.5: 37 clusters

      Integration quality:
      - ASW_batch = 0.024 (near 0, good batch mixing)
      - Cluster mixing score = 0.565
      - 5 dataset-dominant clusters (CD133-enriched and AS disease-specific) reflect biological differences
    key_decisions:
      - "GSE215968 X is log-normalized (Seurat LogNormalize); raw counts back-computed via expm1 (scale=10000), error <0.3 verified"
      - "GSE260658 myometrium excluded; only endometrium+decidua retained (27,651 cells)"
      - "AS_pre_vs_post excluded to avoid treatment confounding; organoid excluded to maintain in vivo data consistency"
      - "HVG selected using seurat_v3 flavor, dataset-aware selection"
      - "PCA computed only on 3000 HVG subset with scale+PCA (avoids full-genome densification; memory reduced from 74GB to 38GB)"
      - "Randomized SVD used instead of arpack; PCA time reduced from >30min to ~1min"
      - "Harmony GPU-accelerated; 3-round convergence in only 7 seconds"
    outputs:
      - "Phase_output/phase3_integration/integrated_harmony.h5ad (314,805 cells, 25GB)"
      - "Phase_output/phase3_integration/integration_stats.json"
      - "Phase_output/phase3_integration/integration_quality.json"

