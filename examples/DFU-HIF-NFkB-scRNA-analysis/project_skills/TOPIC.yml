topic:
  title: "HIF-1α and NF-κB Hypoxia-Inflammation Coupling in Diabetic Foot Ulcers"
  title_zh: "Research on HIF-1alpha and NF-kappaB Hypoxia-Inflammation Coupling in Diabetic Foot Ulcers"
  domain: "transcriptomics"
  sub_domain: "wound_healing_immunology"
  organism: "Homo sapiens"

scientific_questions:
  Q1:
    question: "Which cell types are the primary carriers of HIF1A/NFKB1 co-expression? How do the activation states and associations of the two pathways differ across cell types?"
    answered_by: [Phase1]
  Q2:
    question: "How does the co-expression pattern of HIF1A/NFKB1 correlate with wound healing outcomes? In which cell types do healing vs. non-healing groups show differences in pathway activity?"
    answered_by: [Phase1, Phase2]
  Q3:
    question: "What are the common target genes co-regulated by HIF-1alpha and NF-kappaB? How are these co-regulated target genes dysregulated in diabetic wounds?"
    answered_by: [Phase2, Phase4]
  Q4:
    question: "Is HIF/NF-kappaB dysregulation in diabetic wounds a sustained or delayed response? How does the temporal dynamic pattern differ from normal acute healing?"
    answered_by: [Phase3]
  Q5:
    question: "How does HIF/NF-kappaB activation state in macrophage subpopulations correlate with M1/M2 polarization? What are the transcriptional reprogramming characteristics of macrophages under hypoxic conditions?"
    answered_by: [Phase1, Phase4]

